version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: dev_web_II_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dev_web_II_db
      MYSQL_USER: dev_web_II_user
      MYSQL_PASSWORD: dev_web_II_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: